    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Serif SC', serif;}
        :root{
            --accent-color: #c5a47e;
            --accent-color-rgb: 197,164,126;
            --primary-bg: #0a0a0a;
            --secondary-bg: #121212;
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.7);
            --border-color: rgba(255,255,255,0.1);
            --message-sent-bg: #c5a47e;
            --message-sent-text: #000;
            --message-received-bg: #1a1a1a;
            --message-received-text: #fff;
        }
        body{background:var(--primary-bg);color:var(--text-primary);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;align-items:center;justify-content:center;padding:20px;}
        .modal.active{display:flex;}
        .modal-content{background:var(--secondary-bg);border-radius:20px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;}
        .modal-title{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border-color);}
        .modal-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border-color);background:var(--primary-bg);color:var(--text-primary);margin-bottom:15px;outline:none;}
        .modal-textarea{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border-color);background:var(--primary-bg);color:var(--text-primary);min-height:100px;outline:none;resize:vertical;}
        .modal-buttons{display:flex;gap:10px;margin-top:20px;}
        .modal-btn{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:500;}
        .modal-btn-primary{background:var(--accent-color);color:#000;}
        .modal-btn-secondary{background:var(--primary-bg);color:var(--text-primary);border:1px solid var(--border-color);}

        #splash-declaration{position:fixed;inset:0;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:10000;}
        .splash-inner{width:100%;max-width:500px;}
        .splash-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:rgba(var(--accent-color-rgb),0.1);color:var(--accent-color);font-size:12px;font-weight:600;margin-bottom:20px;}
        .splash-card{background:var(--secondary-bg);border-radius:20px;padding:24px;}
        .splash-slide{display:none;}
        .splash-slide.active{display:block;}
        .splash-slide-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent-color);font-weight:600;margin-bottom:8px;}
        .splash-slide-title{font-size:24px;font-weight:600;margin-bottom:16px;}
        .splash-slide-body{font-size:14px;line-height:1.8;color:var(--text-secondary);}
        .splash-highlight-box{background:rgba(var(--accent-color-rgb),0.1);border:1px solid rgba(var(--accent-color-rgb),0.3);border-radius:10px;padding:12px;margin-top:12px;}
        .splash-pledge-desc{font-size:13px;margin-bottom:10px;}
        .splash-pledge-required{font-size:14px;font-weight:600;color:var(--accent-color);margin:10px 0;padding:10px;background:rgba(var(--accent-color-rgb),0.08);border-radius:10px;text-align:center;}
        .splash-pledge-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border-color);background:var(--primary-bg);color:var(--text-primary);margin:10px 0;font-size:14px;outline:none;}
        .splash-pledge-hint{font-size:12px;color:var(--text-secondary);}
